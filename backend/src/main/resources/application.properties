spring.application.name=tuteloapp

# H2 - Desarrollo (DB actual)
spring.datasource.url=jdbc:h2:file:./data/tuteloapp;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# CORRECCIËN - Punto 4: Uso de Flyway
# Se define una sola estrategia de manejo de esquema para entorno de desarrollo:
# Hibernate queda a cargo de crear/actualizar la base de datos.
# Flyway deja de formar parte de la configuraciˇn activa del proyecto.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Consola H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping=TRACE

# Multipart / uploads
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
server.tomcat.max-swallow-size=-1

